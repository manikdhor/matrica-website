name: Deploy to cPanel

# Every push to master: CI builds the Next.js standalone bundle on Linux
# (matching the host), rsyncs it over SSH to the cPanel Node app root, and
# reloads Passenger. Nothing is built on the shared host.
on:
  push:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: deploy-master
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build (Next.js standalone)
        run: npm run build

      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy over rsync
        run: |
          rsync -az --delete \
            --exclude='tmp/' \
            --exclude='.env' \
            --exclude='upload/' \
            --exclude='.htaccess' \
            -e "ssh -p ${{ secrets.SSH_PORT }} -i ~/.ssh/id_deploy" \
            .next/standalone/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.APP_ROOT }}/"

      - name: Restart Passenger
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" -i ~/.ssh/id_deploy \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p '${{ secrets.APP_ROOT }}/tmp' && touch '${{ secrets.APP_ROOT }}/tmp/restart.txt'"
